<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Food Store</title>
</head>

<body>

<form id="form-registro">
    <h1>Crear Cuenta</h1>

    <div>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required autocomplete="off" placeholder="example@example.com">
    </div>

    <div>
        <label for="password">Contraseña:</label>
        <input type="password" id="password" name="password" required autocomplete="off" placeholder="********">
    </div>

    <button type="submit">Registrarse</button>

    <p>¿Ya tienes cuenta? <a href="../login/login.html">Inicia sesión</a></p>
</form>

<script type="module" src="./registro.ts"></script>

</body>

</html>
