<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Food Store</title>
    <link rel="stylesheet" href="../../../utils/style.css">
</head>

<body>
<div class="login-wrapper">
<div class="login-container">
    <div class="login-header">
        <h1>🍔 Food Store</h1>
        <p>Crear Cuenta</p>
    </div>

    <form id="form-registro" class="login-form">
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required autocomplete="off" placeholder="tu@email.com">
        </div>

        <div class="form-group">
            <label for="password">Contraseña</label>
            <input type="password" id="password" name="password" required autocomplete="off" placeholder="********">
        </div>

        <button type="submit" class="btn-submit">Registrarse</button>
    </form>

    <div class="login-footer">
        <p>¿Ya tenés cuenta? <a href="../login/login.html">Iniciá sesión</a></p>
    </div>
</div>

<div id="custom-modal" class="modal-overlay hidden">
    <div class="modal-card">
        <div class="modal-icon">🍔</div>
        <h3 id="modal-title">Título</h3>
        <p id="modal-message">Mensaje de aviso.</p>
        <div class="modal-actions">
            <button id="modal-btn-confirm" class="btn-modal-primary">Aceptar</button>
        </div>
    </div>
</div>
</div>
<script type="module" src="./registro.ts"></script>
</body>

</html>
