<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Food Store</title>
</head>

<body>
<h1>Iniciar Sesión</h1>

<form id="form-login">
    <div>
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required autocomplete="off" placeholder="example@example.com">
    </div>
    <div>
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" required autocomplete="off" placeholder="********">
    </div>

    <button type="submit">Ingresar</button>
    <p>¿No tienes cuenta? <a href="../registro/registro.html">Regístrate aquí</a></p>
</form>

<script type="module" src="./login.ts"></script>
</body>

</html>
