<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Store - Catálogo</title>
    <link rel="stylesheet" href="../../../utils/style.css">
</head>
<body>
<header class="topbar">
    <div class="topbar-left">
        <a href="/src/pages/store/home/home.html" class="logo">
            <h1>🍔 Food Store</h1>
        </a>

        <nav class="main-nav">
            <a href="/src/pages/store/home/home.html" class="nav-link active">Inicio</a>
            <a href="/src/pages/store/cart/cart.html" class="nav-link">Mi carrito</a>
            <a href="/src/pages/store/orders/orders.html" class="nav-link">Mis pedidos</a>
        </nav>
    </div>

    <div class="header-actions">
        <div class="user-menu">
            <span id="user-name">Hola, Usuario</span>
            <button id="btn-logout" class="btn-outline">Cerrar sesión</button>
        </div>

        <div class="cart-container">
            <button id="btn-cart" class="cart-btn">🛒 Carrito (<span id="cart-count">0</span>)</button>

            <div id="mini-cart" class="mini-cart hidden">
                <h3>Tu Pedido</h3>
                <div id="mini-cart-items"></div>
                <div class="mini-cart-footer">
                    <p>Total: $<span id="mini-cart-total">0</span></p>
                    <button id="btn-checkout" class="btn-checkout">Ir a Pagar</button>
                </div>
            </div>
        </div>
    </div>
</header>

<div class="layout-container">

    <aside class="sidebar">
        <div class="search-container">
            <input type="text" id="search-input" placeholder="Buscar producto...">
        </div>

        <h3 style="margin-top: 15px;">Categorías</h3>
        <ul id="category-list">
        </ul>
    </aside>

    <main class="main-content">
        <div id="product-grid" class="grid-container">
        </div>

        <div class="pagination-controls">
            <button id="btn-prev" class="btn-page" disabled>⬅ Anterior</button>
            <span id="page-info">Página 1 de X</span>
            <button id="btn-next" class="btn-page">Siguiente ➡</button>
        </div>
    </main>

</div>

<footer class="site-footer">
    <p>© 2026 Food Store - Todos los derechos reservados | Desarrollado por Brian Emanuel Rios</p>
</footer>

<div id="custom-modal" class="modal-overlay hidden">
    <div class="modal-card">
        <div class="modal-icon">🍔</div>
        <h3 id="modal-title">¿Estás seguro?</h3>
        <p id="modal-message">Esta acción no se puede deshacer.</p>
        <div class="modal-actions">
            <button id="modal-btn-cancel" class="btn-modal-secondary">Cancelar</button>
            <button id="modal-btn-confirm" class="btn-modal-primary">Aceptar</button>
        </div>
    </div>
</div>

<script type="module" src="./home.ts"></script>
<link rel="stylesheet" href="../../../utils/style.css">
</body>
</html>
</html>
